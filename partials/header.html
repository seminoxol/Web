<header class="{{HEADER_CLASS}}" id="header">
    <div class="wrap header__inner">
        <a href="/" class="brand">
            <img src="/images/pcilogo.png" alt="PCI Glass logo" class="brand__logo" width="44" height="44" decoding="async" fetchpriority="high">
            <span class="brand__text">
                <span class="brand__mark">PCI</span>
                <span class="brand__name">Glass</span>
            </span>
        </a>

        <nav class="nav" id="nav" aria-label="Main">
            <a href="/#about" class="nav__link">About</a>
            <a href="/#services" class="nav__link">Services</a>
            <a href="/#products" class="nav__link">Products</a>
            <a href="/#gallery" class="nav__link">Gallery</a>
            <a href="/#contact" class="nav__link">Contact</a>
            <a href="/faq/" class="nav__link{{NAV_FAQ_CLASS}}"{{NAV_FAQ_ARIA}}>FAQ</a>
            <a href="/#quote" class="nav__link nav__link--mobile-cta">Get a Quote</a>
        </nav>

        <div class="header__actions">
            <a href="tel:+14162975959" class="header__phone">416-297-5959</a>
            <a href="/#quote" class="btn btn--accent">Get a Quote</a>
        </div>

        <button class="theme-btn" id="themeBtn" aria-label="Switch to light mode">
            <svg id="themeIconDark" class="is-visible" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="themeIconLight" class="is-hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>

        <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span>
        </button>
    </div>
</header>
